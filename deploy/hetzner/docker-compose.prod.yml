services:
  cow-solver:
    image: ghcr.io/mounirhajri/cow-solver:${SOLVER_TAG:-latest}
    container_name: cow-solver
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '1.8'
          memory: 3G
        reservations:
          memory: 512M
    environment:
      REDIS_URL: redis://redis:6379/3
      REDIS_KEY_PREFIX: "solver:"
      POOL_CACHE_MAX_ENTRIES: 800
      POOL_CACHE_TTL_SECONDS: 60
      AMM_STATE_LAZY: "true"
      RPC_ARBITRUM: ${RPC_ARBITRUM}
      SHADOW_LOG_PATH: /data/shadow.jsonl
      LOG_LEVEL: INFO
      PROMETHEUS_PORT: 8001
    volumes:
      - ./data:/data
    networks: [stack]
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 5s
      retries: 3

  reconciler:
    image: ghcr.io/mounirhajri/cow-solver:${SOLVER_TAG:-latest}
    container_name: cow-reconciler
    restart: unless-stopped
    command: ["python", "-m", "scripts.reconcile_loop"]
    deploy:
      resources:
        limits:
          memory: 256M
    environment:
      LOG_LEVEL: INFO
      SHADOW_LOG_PATH: /data/shadow.jsonl
    volumes:
      - ./data:/data
    networks: [stack]

  shadow-poller:
    image: ghcr.io/mounirhajri/cow-solver:${SOLVER_TAG:-latest}
    container_name: cow-shadow-poller
    restart: unless-stopped
    command: ["python", "-m", "scripts.shadow_poller"]
    deploy:
      resources:
        limits:
          memory: 256M
    environment:
      SOLVER_INTERNAL_URL: http://cow-solver:8000
      SHADOW_LOG_PATH: /data/shadow.jsonl
      LOG_LEVEL: INFO
    volumes:
      - ./data:/data
    depends_on:
      cow-solver:
        condition: service_healthy
    networks: [stack]
