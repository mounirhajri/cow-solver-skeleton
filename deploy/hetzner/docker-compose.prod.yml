services:
  cow-solver:
    image: ghcr.io/mounirhajri/cow-solver:${SOLVER_TAG:-latest}
    container_name: cow-solver
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '1.8'
          memory: 3G
        reservations:
          memory: 512M
    environment:
      REDIS_URL: redis://redis:6379/3
      REDIS_KEY_PREFIX: "solver:"
      RPC_ARBITRUM: ${RPC_ARBITRUM}
      SHADOW_LOG_PATH: /data/shadow.jsonl
      LOG_LEVEL: INFO
      PROMETHEUS_PORT: 8001
      DATABASE_URL: postgresql+asyncpg://solver:${SOLVER_DB_PASSWORD}@postgres:5432/solver
      # Solver-Tuning durchgereicht aus parent .env, mit Defaults die der
      # 2026-05-29 Live-Diagnose entsprechen (long-tail aus, längerer Cache,
      # Concurrency-Cap fürs RPC-Budget).
      LONG_TAIL_ENABLED: ${LONG_TAIL_ENABLED:-false}
      POOL_CACHE_TTL_SECONDS: ${POOL_CACHE_TTL_SECONDS:-300}
      POOL_CACHE_MAX_ENTRIES: ${POOL_CACHE_MAX_ENTRIES:-800}
      AMM_STATE_LAZY: ${AMM_STATE_LAZY:-true}
      ROUTER_MAX_CONCURRENT: ${ROUTER_MAX_CONCURRENT:-3}
      EBBO_ENABLED: ${EBBO_ENABLED:-true}
      EBBO_TOLERANCE_BPS: ${EBBO_TOLERANCE_BPS:-50}
      # GoPlus authenticated tier for scripts/auto_seed_labels.py. Both must
      # be set or the script falls back to anonymous mode (~3 req/s ceiling).
      GOPLUS_APP_KEY: ${GOPLUS_APP_KEY:-}
      GOPLUS_APP_SECRET: ${GOPLUS_APP_SECRET:-}
    volumes:
      - ./data:/data
    networks: [stack]
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 5s
      retries: 3

  reconciler:
    image: ghcr.io/mounirhajri/cow-solver:${SOLVER_TAG:-latest}
    container_name: cow-reconciler
    restart: unless-stopped
    command: ["python", "-m", "scripts.reconcile_loop"]
    deploy:
      resources:
        limits:
          memory: 256M
    environment:
      LOG_LEVEL: INFO
      SHADOW_LOG_PATH: /data/shadow.jsonl
      DATABASE_URL: postgresql+asyncpg://solver:${SOLVER_DB_PASSWORD}@postgres:5432/solver
    volumes:
      - ./data:/data
    networks: [stack]
    healthcheck:
      test: ["CMD", "python", "-c", "import sys; from pathlib import Path; from scripts.liveness import is_alive; sys.exit(0 if is_alive(Path('/data/reconciler.alive'), 120) else 1)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 60s

  shadow-poller:
    image: ghcr.io/mounirhajri/cow-solver:${SOLVER_TAG:-latest}
    container_name: cow-shadow-poller
    restart: unless-stopped
    command: ["python", "-m", "scripts.shadow_poller"]
    deploy:
      resources:
        limits:
          memory: 256M
    environment:
      SOLVER_INTERNAL_URL: http://cow-solver:8000
      SHADOW_LOG_PATH: /data/shadow.jsonl
      LOG_LEVEL: INFO
      DATABASE_URL: postgresql+asyncpg://solver:${SOLVER_DB_PASSWORD}@postgres:5432/solver
    volumes:
      - ./data:/data
    depends_on:
      cow-solver:
        condition: service_healthy
    networks: [stack]
    healthcheck:
      test: ["CMD", "python", "-c", "import sys; from pathlib import Path; from scripts.liveness import is_alive; sys.exit(0 if is_alive(Path('/data/shadow_poller.alive'), 300) else 1)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 120s

networks:
  stack:
    external: true
    name: stack_stack
