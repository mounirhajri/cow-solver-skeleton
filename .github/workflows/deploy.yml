name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image_tag: ${{ steps.meta.outputs.tags }}
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          ssh-key: ${{ secrets.EDGE_SUBMODULE_KEY }}

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute tags
        id: meta
        run: |
          echo "tags=ghcr.io/${{ github.repository_owner }}/cow-solver:latest,ghcr.io/${{ github.repository_owner }}/cow-solver:${{ github.sha }}" >> $GITHUB_OUTPUT

      - uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build
    runs-on: ubuntu-latest
    if: ${{ vars.DEPLOY_ENABLED == 'true' }}
    steps:
      - uses: actions/checkout@v4
        with:
          sparse-checkout: |
            config/driver.shadow.toml
            config/autopilot.shadow.toml
            docker-compose.yml
          sparse-checkout-cone-mode: false

      - name: Copy compose + cow-stack configs to host
        env:
          SSH_KEY: ${{ secrets.HETZNER_SSH_KEY }}
          HOST: ${{ secrets.HETZNER_HOST }}
          USER: ${{ secrets.HETZNER_USER }}
        run: |
          echo "$SSH_KEY" > /tmp/deploy_key
          chmod 600 /tmp/deploy_key
          # Sync the compose definition and both cow-stack configs (driver
          # + autopilot) so the SSH step always operates on the version
          # checked into the repo.  Without the compose sync, any service
          # added in a PR would be invisible on the host until manually
          # scp'ed, silently breaking the cow-stack profile.
          ssh -i /tmp/deploy_key -o StrictHostKeyChecking=no -o BatchMode=yes \
            "$USER@$HOST" "mkdir -p /opt/mhagentic/stack/cow-solver/config"
          scp -i /tmp/deploy_key -o StrictHostKeyChecking=no \
            docker-compose.yml \
            "$USER@$HOST:/opt/mhagentic/stack/cow-solver/docker-compose.yml"
          scp -i /tmp/deploy_key -o StrictHostKeyChecking=no \
            config/driver.shadow.toml \
            "$USER@$HOST:/opt/mhagentic/stack/cow-solver/config/driver.shadow.toml"
          scp -i /tmp/deploy_key -o StrictHostKeyChecking=no \
            config/autopilot.shadow.toml \
            "$USER@$HOST:/opt/mhagentic/stack/cow-solver/config/autopilot.shadow.toml"

      - name: Deploy via SSH
        env:
          SSH_KEY: ${{ secrets.HETZNER_SSH_KEY }}
          HOST: ${{ secrets.HETZNER_HOST }}
          USER: ${{ secrets.HETZNER_USER }}
        run: |
          ssh -i /tmp/deploy_key \
            -o StrictHostKeyChecking=no \
            -o BatchMode=yes \
            "$USER@$HOST" bash -s << 'ENDSSH'
          set -e
          cd /opt/mhagentic/stack/cow-solver

          # ── REWARDS_ADDRESS gating ──────────────────────────────────────
          # The solver engine validates this env var at startup. Default
          # (zero address) is accepted but routes rewards to the burn
          # address — fine for shadow, hard fail before Barn onboarding.
          if ! grep -q '^REWARDS_ADDRESS=' .env 2>/dev/null; then
            echo "REWARDS_ADDRESS=0x0000000000000000000000000000000000000000" >> .env
            echo "::warning::REWARDS_ADDRESS not set; using placeholder zero address. Set a real address before Barn onboarding."
          fi

          # ── COW_SOLVER_IMAGE pin ────────────────────────────────────────
          # docker-compose.yml uses ``${COW_SOLVER_IMAGE:-cow-solver:dev}``
          # so local builds can keep using the legacy tag. On the production
          # host we pin to the GHCR image so ``docker compose up`` for any
          # service that depends_on cow-solver (cow-driver, cow-autopilot,
          # ...) doesn't try to rebuild from a Dockerfile that isn't there.
          if ! grep -q '^COW_SOLVER_IMAGE=' .env 2>/dev/null; then
            echo "COW_SOLVER_IMAGE=ghcr.io/mounirhajri/cow-solver:latest" >> .env
          fi

          # ── DATABASE_URL hard requirement ───────────────────────────────
          # All persistence-touching services (cow-solver, reconciler,
          # ghost-refresh, shadow-poller, cow-solver-comp-sync) read
          # DATABASE_URL via ``${DATABASE_URL}`` substitution in compose.
          # No safe default — the postgres password is a secret. Fail the
          # deploy loudly if absent rather than silently letting alembic
          # fall back to its localhost:5432 default (which doesn't exist).
          if ! grep -q '^DATABASE_URL=' .env 2>/dev/null; then
            echo "ERROR: DATABASE_URL not in /opt/mhagentic/stack/cow-solver/.env" >&2
            echo "Add it manually before the next deploy:" >&2
            echo "  echo 'DATABASE_URL=postgresql+asyncpg://USER:PASS@postgres:5432/solver' >> .env" >&2
            exit 1
          fi

          # ── Pull our service image + the CoW reference stack image ─────
          # All long-running services that share our cow-solver image are
          # pulled together. shadow-poller + cow-solver-comp-sync were
          # re-added to the compose file from docker-inspect data — they
          # join the host's stack_stack network to reach the postgres
          # managed by /opt/mhagentic/stack/.
          # The CoW reference stack image gets pre-cached so the operator
          # can ``--profile cow-stack up`` in seconds.
          sudo docker compose -f docker-compose.yml pull \
            cow-solver reconciler ghost-refresh shadow-poller cow-solver-comp-sync
          sudo docker pull ghcr.io/cowprotocol/services:latest

          # ── Bring up our own services ─────────────────────────────────
          # cow-stack profile services (cow-driver, cow-autopilot) are NOT
          # started here — they remain operator-triggered to control RPC
          # consumption and verify behavior before sustained runs.
          sudo docker compose -f docker-compose.yml up -d \
            cow-solver reconciler ghost-refresh shadow-poller cow-solver-comp-sync
          sleep 8
          sudo docker compose -f docker-compose.yml exec -T cow-solver /app/.venv/bin/alembic upgrade head
          sudo docker compose -f docker-compose.yml ps \
            cow-solver reconciler ghost-refresh shadow-poller cow-solver-comp-sync
          curl -fsS http://localhost:8000/health
          ENDSSH
