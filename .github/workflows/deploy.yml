name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image_tag: ${{ steps.meta.outputs.tags }}
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          ssh-key: ${{ secrets.EDGE_SUBMODULE_KEY }}

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute tags
        id: meta
        run: |
          echo "tags=ghcr.io/${{ github.repository_owner }}/cow-solver:latest,ghcr.io/${{ github.repository_owner }}/cow-solver:${{ github.sha }}" >> $GITHUB_OUTPUT

      - uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build
    runs-on: ubuntu-latest
    if: ${{ vars.DEPLOY_ENABLED == 'true' }}
    steps:
      - name: Deploy via SSH
        env:
          SSH_KEY: ${{ secrets.HETZNER_SSH_KEY }}
          HOST: ${{ secrets.HETZNER_HOST }}
          USER: ${{ secrets.HETZNER_USER }}
        run: |
          echo "$SSH_KEY" > /tmp/deploy_key
          chmod 600 /tmp/deploy_key
          ssh -i /tmp/deploy_key \
            -o StrictHostKeyChecking=no \
            -o BatchMode=yes \
            "$USER@$HOST" bash -s << 'ENDSSH'
          set -e
          COMPOSE_DIR=$(find /opt /home -name "docker-compose.prod.yml" 2>/dev/null -printf "%h\n" | head -1)
          cd "$COMPOSE_DIR"
          docker compose -f docker-compose.prod.yml pull cow-solver reconciler shadow-poller
          docker compose -f docker-compose.prod.yml up -d cow-solver reconciler shadow-poller
          sleep 8
          docker compose -f docker-compose.prod.yml exec -T cow-solver /app/.venv/bin/alembic upgrade head
          docker compose -f docker-compose.prod.yml ps cow-solver reconciler shadow-poller
          curl -fsS http://localhost:8000/health
          ENDSSH
