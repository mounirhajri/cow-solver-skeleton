services:
  cow-solver:
    # Image tag falls back to the local-built ``cow-solver:dev`` for dev /
    # CI / tests where the GHCR image is unreachable. Production deploys
    # override via the ``COW_SOLVER_IMAGE`` env var (set in /opt/.../​.env
    # by the deploy step) to ``ghcr.io/mounirhajri/cow-solver:latest`` so
    # ``docker compose pull`` and ``up`` resolve the registry image
    # without trying to build a Dockerfile that isn't present on the host.
    build: .
    image: ${COW_SOLVER_IMAGE:-cow-solver:dev}
    container_name: cow-solver
    restart: unless-stopped
    ports:
      - "8000:8000"
    networks:
      - stack
    environment:
      ONEINCH_API_KEY: ${ONEINCH_API_KEY:-dummy}
      RPC_ARBITRUM: ${RPC_ARBITRUM:-https://arb1.arbitrum.io/rpc}
      REDIS_URL: redis://redis:6379/3
      DATABASE_URL: ${DATABASE_URL}
      REWARDS_ADDRESS: ${REWARDS_ADDRESS:-0x0000000000000000000000000000000000000000}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      SHADOW_LOG_PATH: /data/shadow.jsonl
    volumes:
      - ./data:/data
    depends_on:
      redis:
        condition: service_healthy

  reconciler:
    # Image tag falls back to the local-built ``cow-solver:dev`` for dev /
    # CI / tests where the GHCR image is unreachable. Production deploys
    # override via the ``COW_SOLVER_IMAGE`` env var (set in /opt/.../​.env
    # by the deploy step) to ``ghcr.io/mounirhajri/cow-solver:latest`` so
    # ``docker compose pull`` and ``up`` resolve the registry image
    # without trying to build a Dockerfile that isn't present on the host.
    build: .
    image: ${COW_SOLVER_IMAGE:-cow-solver:dev}
    container_name: cow-reconciler
    restart: unless-stopped
    networks:
      - stack
    command: ["python", "-m", "scripts.reconcile_loop"]
    environment:
      DATABASE_URL: ${DATABASE_URL}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      SHADOW_LOG_PATH: /data/shadow.jsonl
    volumes:
      - ./data:/data

  ghost-refresh:
    # Image tag falls back to the local-built ``cow-solver:dev`` for dev /
    # CI / tests where the GHCR image is unreachable. Production deploys
    # override via the ``COW_SOLVER_IMAGE`` env var (set in /opt/.../​.env
    # by the deploy step) to ``ghcr.io/mounirhajri/cow-solver:latest`` so
    # ``docker compose pull`` and ``up`` resolve the registry image
    # without trying to build a Dockerfile that isn't present on the host.
    build: .
    image: ${COW_SOLVER_IMAGE:-cow-solver:dev}
    container_name: cow-ghost-refresh
    restart: unless-stopped
    networks:
      - stack
    command: ["python", "-m", "scripts.refresh_ghost_set", "--loop"]
    environment:
      DATABASE_URL: ${DATABASE_URL}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    volumes:
      - ./data:/data
    depends_on:
      redis:
        condition: service_healthy

  redis:
    image: redis:7-alpine
    container_name: cow-solver-redis
    ports:
      - "6379:6379"
    networks:
      - stack
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ── Shadow data pipeline ───────────────────────────────────────────────
  #
  # shadow-poller pulls auctions from the public CoW orderbook and persists
  # every strategy attempt + winner outcome into the shared postgres. The
  # cow-solver-comp-sync container periodically pulls solver-competition
  # data (one row per (auction, solver)) so analyze_competitors.py has the
  # benchmark sample it needs.
  #
  # Both services join the host-level ``stack_stack`` network (managed by
  # /opt/mhagentic/stack/docker-compose.yml) to reach the shared postgres.
  # They read ``DATABASE_URL`` from /opt/mhagentic/stack/cow-solver/.env
  # via docker-compose's automatic env_file expansion — the secret never
  # appears in this repo.

  shadow-poller:
    build: .
    image: ${COW_SOLVER_IMAGE:-cow-solver:dev}
    container_name: cow-shadow-poller
    restart: unless-stopped
    user: app
    networks:
      - stack
    command: ["python", "-m", "scripts.shadow_poller"]
    environment:
      DATABASE_URL: ${DATABASE_URL}
      SOLVER_INTERNAL_URL: http://cow-solver:8000
      SHADOW_LOG_PATH: /data/shadow.jsonl
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    volumes:
      - ./data:/data
    healthcheck:
      # File-based liveness — scripts.shadow_poller touches the .alive file
      # at the end of each poll cycle. Unhealthy if no touch within 5 min,
      # which indicates the loop is stuck (network hang, RPC timeout, etc.)
      # rather than a startup blip.
      test:
        - "CMD"
        - "python"
        - "-c"
        - "import sys; from pathlib import Path; from scripts.liveness import is_alive; sys.exit(0 if is_alive(Path('/data/shadow_poller.alive'), 300) else 1)"
      interval: 30s
      timeout: 5s
      start_period: 120s
      retries: 3
    mem_limit: 256m
    depends_on:
      cow-solver:
        condition: service_started

  cow-solver-comp-sync:
    build: .
    image: ${COW_SOLVER_IMAGE:-cow-solver:dev}
    container_name: cow-solver-comp-sync
    restart: unless-stopped
    user: app
    networks:
      - stack
    # ``sleep 60`` waits for cow-solver + postgres before the first batch;
    # this avoids the early-startup connection-refused storm that shows up
    # in docker logs as 60s of urlopen tracebacks. 15-min cycle matches
    # the CoW competition API's update cadence — pulling faster wastes
    # rate-limit budget without surfacing fresher data.
    command:
      - sh
      - -c
      - |
        echo '[comp-sync] startup, waiting 60s for solver+postgres warmup';
        sleep 60;
        while true; do
          echo "[comp-sync] $(date -u +%Y-%m-%dT%H:%M:%SZ) starting batch";
          python -m scripts.sync_competitions --days 1 --limit 200 || echo '[comp-sync] batch failed, continuing';
          echo '[comp-sync] sleeping 900s (15min)';
          sleep 900;
        done
    environment:
      DATABASE_URL: ${DATABASE_URL}
      COW_API_RPS: "0.5"
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    mem_limit: 256m
    mem_reservation: 64m
    # Healthcheck inherited from production: hits localhost:8000/health
    # which is the container itself, not cow-solver — by design unhealthy
    # ("Connection refused" because nothing listens on container's :8000).
    # The container is functional; the healthcheck is cosmetic. Fix in a
    # separate PR by either pointing at cow-solver:8000 (cross-service) or
    # removing the healthcheck entirely (worker pattern, no HTTP surface).
    healthcheck:
      test:
        - "CMD-SHELL"
        - "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health').read()\" || exit 1"
      interval: 30s
      timeout: 5s
      retries: 3
    depends_on:
      cow-solver:
        condition: service_started

  # ── CoW Reference Stack (shadow profile) ───────────────────────────────
  #
  # Enable with:
  #     docker compose --profile cow-stack up -d cow-driver cow-autopilot
  #
  # The driver receives auctions from cow-autopilot, fetches liquidity,
  # calls our solver engine at http://cow-solver:8000/solve, post-processes
  # the response (including simulation), and would submit on-chain if not
  # in shadow mode. The autopilot is configured against Arbitrum One
  # production orderbook so we see real auction order flow without
  # actually settling anything — this gives us local Tier-3 verification
  # data (= which of our shadow solutions would actually settle).

  cow-driver:
    image: ghcr.io/cowprotocol/services:latest
    container_name: cow-driver
    profiles: ["cow-stack"]
    restart: unless-stopped
    networks:
      - stack
    ports:
      - "11088:11088"
    command: ["driver", "--config", "/etc/driver.config.toml", "--ethrpc", "${RPC_ARBITRUM}"]
    volumes:
      - ./config/driver.shadow.toml:/etc/driver.config.toml:ro
    depends_on:
      cow-solver:
        condition: service_started

  cow-autopilot:
    image: ghcr.io/cowprotocol/services:latest
    container_name: cow-autopilot
    profiles: ["cow-stack"]
    restart: unless-stopped
    networks:
      - stack
    # Modern autopilot only accepts ``--config <PATH>``; the individual
    # CLI flags from older docs were removed in the v0.x refactor. Auction
    # source (shadow URL), drivers list, native-price-estimators, and
    # node-url all live in the toml now.
    command: ["autopilot", "--config", "/etc/autopilot.config.toml"]
    environment:
      RPC_ARBITRUM: ${RPC_ARBITRUM:-https://arb1.arbitrum.io/rpc}
    volumes:
      - ./config/autopilot.shadow.toml:/etc/autopilot.config.toml:ro
    depends_on:
      - cow-driver

  # Legacy alias preserved so any existing tooling that references
  # ``shadow-driver`` keeps working. New deployments should use cow-driver
  # via the cow-stack profile above.
  shadow-driver:
    image: ghcr.io/cowprotocol/services:latest
    container_name: cow-shadow-driver
    profiles: ["shadow"]
    networks:
      - stack
    command: ["driver", "--config", "/etc/driver.shadow.toml", "--shadow"]
    volumes:
      - ./config/driver.shadow.toml:/etc/driver.shadow.toml:ro
    depends_on:
      cow-solver:
        condition: service_started

# ── External networks ──────────────────────────────────────────────────
#
# ``stack`` is the shared docker network defined by /opt/mhagentic/stack/
# docker-compose.yml. It contains the postgres instance that all the
# stack-level services (cow-solver, ai-backoffice, etc.) share. Marking
# it external means this compose project joins the network without
# creating or owning it — the parent stack manages its lifecycle.
networks:
  stack:
    external: true
    name: stack_stack
