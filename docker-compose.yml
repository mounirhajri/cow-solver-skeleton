services:
  cow-solver:
    # Image tag falls back to the local-built ``cow-solver:dev`` for dev /
    # CI / tests where the GHCR image is unreachable. Production deploys
    # override via the ``COW_SOLVER_IMAGE`` env var (set in /opt/.../​.env
    # by the deploy step) to ``ghcr.io/mounirhajri/cow-solver:latest`` so
    # ``docker compose pull`` and ``up`` resolve the registry image
    # without trying to build a Dockerfile that isn't present on the host.
    build: .
    image: ${COW_SOLVER_IMAGE:-cow-solver:dev}
    container_name: cow-solver
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      ONEINCH_API_KEY: ${ONEINCH_API_KEY:-dummy}
      RPC_ARBITRUM: ${RPC_ARBITRUM:-https://arb1.arbitrum.io/rpc}
      REDIS_URL: redis://redis:6379/3
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      SHADOW_LOG_PATH: /data/shadow.jsonl
    volumes:
      - ./shadow_data:/data
    depends_on:
      redis:
        condition: service_healthy

  reconciler:
    # Image tag falls back to the local-built ``cow-solver:dev`` for dev /
    # CI / tests where the GHCR image is unreachable. Production deploys
    # override via the ``COW_SOLVER_IMAGE`` env var (set in /opt/.../​.env
    # by the deploy step) to ``ghcr.io/mounirhajri/cow-solver:latest`` so
    # ``docker compose pull`` and ``up`` resolve the registry image
    # without trying to build a Dockerfile that isn't present on the host.
    build: .
    image: ${COW_SOLVER_IMAGE:-cow-solver:dev}
    container_name: cow-reconciler
    restart: unless-stopped
    command: ["python", "-m", "scripts.reconcile_loop"]
    environment:
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      SHADOW_LOG_PATH: /data/shadow.jsonl
    volumes:
      - ./shadow_data:/data

  ghost-refresh:
    # Image tag falls back to the local-built ``cow-solver:dev`` for dev /
    # CI / tests where the GHCR image is unreachable. Production deploys
    # override via the ``COW_SOLVER_IMAGE`` env var (set in /opt/.../​.env
    # by the deploy step) to ``ghcr.io/mounirhajri/cow-solver:latest`` so
    # ``docker compose pull`` and ``up`` resolve the registry image
    # without trying to build a Dockerfile that isn't present on the host.
    build: .
    image: ${COW_SOLVER_IMAGE:-cow-solver:dev}
    container_name: cow-ghost-refresh
    restart: unless-stopped
    command: ["python", "-m", "scripts.refresh_ghost_set", "--loop"]
    environment:
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    volumes:
      - ./shadow_data:/data
    depends_on:
      redis:
        condition: service_healthy

  redis:
    image: redis:7-alpine
    container_name: cow-solver-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ── CoW Reference Stack (shadow profile) ───────────────────────────────
  #
  # Enable with:
  #     docker compose --profile cow-stack up -d cow-driver cow-autopilot
  #
  # The driver receives auctions from cow-autopilot, fetches liquidity,
  # calls our solver engine at http://cow-solver:8000/solve, post-processes
  # the response (including simulation), and would submit on-chain if not
  # in shadow mode. The autopilot is configured against Arbitrum One
  # production orderbook so we see real auction order flow without
  # actually settling anything — this gives us local Tier-3 verification
  # data (= which of our shadow solutions would actually settle).

  cow-driver:
    image: ghcr.io/cowprotocol/services:latest
    container_name: cow-driver
    profiles: ["cow-stack"]
    restart: unless-stopped
    ports:
      - "11088:11088"
    command: ["driver", "--config", "/etc/driver.config.toml", "--ethrpc", "${RPC_ARBITRUM}"]
    volumes:
      - ./config/driver.shadow.toml:/etc/driver.config.toml:ro
    depends_on:
      cow-solver:
        condition: service_started

  cow-autopilot:
    image: ghcr.io/cowprotocol/services:latest
    container_name: cow-autopilot
    profiles: ["cow-stack"]
    restart: unless-stopped
    # Modern autopilot only accepts ``--config <PATH>``; the individual
    # CLI flags from older docs were removed in the v0.x refactor. Auction
    # source (shadow URL), drivers list, native-price-estimators, and
    # node-url all live in the toml now.
    command: ["autopilot", "--config", "/etc/autopilot.config.toml"]
    environment:
      RPC_ARBITRUM: ${RPC_ARBITRUM:-https://arb1.arbitrum.io/rpc}
    volumes:
      - ./config/autopilot.shadow.toml:/etc/autopilot.config.toml:ro
    depends_on:
      - cow-driver

  # Legacy alias preserved so any existing tooling that references
  # ``shadow-driver`` keeps working. New deployments should use cow-driver
  # via the cow-stack profile above.
  shadow-driver:
    image: ghcr.io/cowprotocol/services:latest
    container_name: cow-shadow-driver
    profiles: ["shadow"]
    command: ["driver", "--config", "/etc/driver.shadow.toml", "--shadow"]
    volumes:
      - ./config/driver.shadow.toml:/etc/driver.shadow.toml:ro
    depends_on:
      cow-solver:
        condition: service_started
